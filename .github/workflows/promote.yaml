name: Promote Charm

on:
  workflow_dispatch:
    inputs:
      promotion:
        type: choice
        description: Channel to promote from
        options:
          - edge -> beta
          - beta -> candidate
          - candidate -> stable

jobs:
  promote:
    name: Promote
    uses: canonical/observability/.github/workflows/charm-promote.yaml@f09a6a6b1982e7c8d8fb84b1cfd73070b44a1ca2 # v1
    with:
      promotion: ${{ github.event.inputs.promotion }}
    secrets: inherit
